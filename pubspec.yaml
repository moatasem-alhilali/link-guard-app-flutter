name: link_guard
description: "LinkGuard - URL Security Scanner by Nano Hive"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP Client - Best Practice
  dio: ^5.4.3+1

  # State Management - Best Practice
  flutter_riverpod: ^2.5.1

  # Localization - Arabic & English
  easy_localization: ^3.0.7

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Theme Persistence
  shared_preferences: ^2.2.3

  # URL Launch
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
